name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy web → public_html
        run: |
          lftp -u "${{ secrets.FTP_USER }}","${{ secrets.FTP_PASSWORD }}" ftp://${{ secrets.FTP_HOST }} <<'FTPEOF'
          set ftp:ssl-allow no
          set net:timeout 30
          mirror -R --delete --verbose \
            --exclude ^\.DS_Store$ \
            --exclude ^\.builds/ \
            web/ /home/u630423897/domains/foxscan.fr/public_html/
          quit
          FTPEOF

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy API → nodejs
        run: |
          lftp -u "${{ secrets.FTP_USER }}","${{ secrets.FTP_PASSWORD }}" ftp://${{ secrets.FTP_HOST }} <<'FTPEOF'
          set ftp:ssl-allow no
          set net:timeout 30
          mirror -R --delete --verbose \
            --exclude ^\.DS_Store$ \
            --exclude ^node_modules/ \
            --exclude ^data/ \
            apps/api/ /home/u630423897/domains/foxscan.fr/nodejs/
          quit
          FTPEOF
