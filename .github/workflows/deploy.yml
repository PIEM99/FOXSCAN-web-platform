name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # web/ → public_html/ via FTP
      - name: Deploy web → public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: web/
          server-dir: /
          exclude: |
            **/.DS_Store
            **/.builds/**

  # L'API Node.js est déployée automatiquement par le git deploy
  # intégré à Hostinger (panel → Node.js → Git). Entry point: apps/api/server.js
