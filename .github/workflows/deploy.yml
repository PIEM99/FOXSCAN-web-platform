name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Site web → public_html/ ───────────────────────────────────────────
      - name: Deploy web → public_html
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          SOURCE: "web/"
          TARGET: "/home/${{ secrets.SSH_USER }}/domains/foxscan.fr/public_html/"
          EXCLUDE: ".DS_Store"
          ARGS: "-rlgoDzvc --delete"

      # ── API Node.js → nodejs/ ─────────────────────────────────────────────
      - name: Deploy API → nodejs
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          SOURCE: "apps/api/"
          TARGET: "/home/${{ secrets.SSH_USER }}/domains/foxscan.fr/nodejs/"
          EXCLUDE: ".DS_Store,node_modules/,data/"
          ARGS: "-rlgoDzvc"

      # ── npm install + restart Node ────────────────────────────────────────
      - name: Install deps & restart app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/domains/foxscan.fr/nodejs
            npm install --production --silent
            # Hostinger Node.js apps se relancent via le panel ou :
            touch tmp/restart.txt 2>/dev/null || true
