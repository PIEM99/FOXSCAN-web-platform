name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy web → public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./web/
          server-dir: public_html/
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.DS_Store
            **/.git*
            **/.git*/**
            **/.builds/**
            **/.well-known/**
            **/.htaccess
            **/cgi-bin/**
            **/error_log
            **/.ftpquota
            **/.trash/**

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API → nodejs
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./apps/api/
          server-dir: nodejs/
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.DS_Store
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/data/**
            data
            data/**
            **/.env
            .env
            **/.env.*
            **/tmp/**
            tmp
            tmp/**
            **/logs/**
            **/*.log
            **/.ftpquota
