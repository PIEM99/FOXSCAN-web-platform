name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # web/ → public_html/ via FTP
      - name: Deploy web → public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: web/
          server-dir: /public_html/
          exclude: |
            **/.DS_Store
            **/.builds/**

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # apps/api/ → nodejs/ (racine domaine)
      - name: Deploy API → nodejs
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: apps/api/
          server-dir: /nodejs/
          exclude: |
            **/.DS_Store
            **/node_modules/**
            **/data/**
